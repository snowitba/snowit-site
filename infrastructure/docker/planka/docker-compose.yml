version: '3.8'

services:
  planka:
    image: ghcr.io/plankanban/planka:latest
    container_name: planka
    restart: unless-stopped
    volumes:
      - planka_data:/app/public/user-avatars
      - planka_attachments:/app/public/project-background-images
      - planka_attachments:/app/private/attachments
    ports:
      - "8081:1337"
    environment:
      - BASE_URL=https://planka.snowit.ba
      - TRUST_PROXY=0
      - DATABASE_URL=postgresql://planka:${PLANKA_DB_PASSWORD}@planka_db/planka
      - SECRET_KEY=${PLANKA_SECRET_KEY:-notSecretKeyYouShouldChangeThis}
    depends_on:
      - planka_db

  planka_db:
    image: postgres:14-alpine
    container_name: planka_db
    restart: unless-stopped
    volumes:
      - planka_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=planka
      - POSTGRES_USER=planka
      - POSTGRES_PASSWORD=${PLANKA_DB_PASSWORD}

volumes:
  planka_data:
  planka_attachments:
  planka_db_data:
