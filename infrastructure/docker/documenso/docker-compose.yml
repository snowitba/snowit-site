version: '3.8'

services:
  documenso:
    image: documenso/documenso:latest
    container_name: documenso
    restart: unless-stopped
    ports:
      - "8082:3000"
    environment:
      # Application
      - NEXTAUTH_URL=https://sign.snowit.ba
      - NEXT_PUBLIC_WEBAPP_URL=https://sign.snowit.ba
      - NEXT_PRIVATE_ENCRYPTION_KEY=${DOCUMENSO_ENCRYPTION_KEY}
      - NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY=${DOCUMENSO_SECONDARY_KEY}

      # Database
      - NEXT_PRIVATE_DATABASE_URL=postgresql://documenso:${DOCUMENSO_DB_PASSWORD}@documenso_db:5432/documenso

      # Email (SES SMTP)
      - NEXT_PRIVATE_SMTP_HOST=email-smtp.eu-central-1.amazonaws.com
      - NEXT_PRIVATE_SMTP_PORT=587
      - NEXT_PRIVATE_SMTP_USERNAME=${SES_SMTP_USERNAME}
      - NEXT_PRIVATE_SMTP_PASSWORD=${SES_SMTP_PASSWORD}
      - NEXT_PRIVATE_SMTP_FROM_ADDRESS=info@snowit.ba
      - NEXT_PRIVATE_SMTP_FROM_NAME=SnowIT Signature

      # S3 Storage (optional - for document storage)
      # - NEXT_PRIVATE_UPLOAD_TRANSPORT=s3
      # - NEXT_PRIVATE_UPLOAD_ENDPOINT=https://s3.eu-central-1.amazonaws.com
      # - NEXT_PRIVATE_UPLOAD_BUCKET=snowit-documenso
      # - NEXT_PRIVATE_UPLOAD_REGION=eu-central-1

    depends_on:
      - documenso_db
    volumes:
      - documenso_data:/opt/documenso/data

  documenso_db:
    image: postgres:15-alpine
    container_name: documenso_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=documenso
      - POSTGRES_USER=documenso
      - POSTGRES_PASSWORD=${DOCUMENSO_DB_PASSWORD}
    volumes:
      - documenso_db_data:/var/lib/postgresql/data

volumes:
  documenso_data:
  documenso_db_data:
